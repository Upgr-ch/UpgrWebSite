<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>De l'idée au plan — Extrait | UpGrade</title>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;1,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Raleway', sans-serif;
      background: #0b1120;
      color: rgba(255,255,255,0.88);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8,15,30,0.97);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      height: 54px;
      gap: 1rem;
    }

    .logo {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #F5E090;
      text-decoration: none;
      flex-shrink: 0;
    }

    .header-center {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      min-width: 0;
      flex: 1;
      justify-content: center;
    }

    .header-label {
      font-size: 0.6rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #B48C28;
      white-space: nowrap;
    }

    .header-sep { color: rgba(255,255,255,0.18); font-size: 0.65rem; }

    .header-title-group { display: flex; flex-direction: column; gap: 0.15rem; min-width: 0; }
    .header-tagline { font-size: 0.62rem; font-weight: 300; font-style: italic; color: rgba(255,255,255,0.45); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .header-title {
      font-size: 0.8rem;
      font-weight: 600;
      font-style: italic;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-shrink: 0;
    }

    .back-link {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: rgba(255,255,255,0.38);
      text-decoration: none;
      white-space: nowrap;
    }
    .back-link:hover { color: rgba(255,255,255,0.7); }

    .btn-dl {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 1rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      background: #F5E090;
      color: #080F1E;
      border-radius: 2px;
      text-decoration: none;
      transition: background 0.18s;
      white-space: nowrap;
    }
    .btn-dl:hover { background: #e8d07a; }
    .btn-dl svg { width: 12px; height: 12px; flex-shrink: 0; }

    .reader {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem 3rem;
      gap: 0;
    }

    .page-wrap {
      width: 100%;
      max-width: 780px;
      margin-bottom: 2px;
      line-height: 0;
      background: #fff;
      border-radius: 1px;
      overflow: hidden;
    }

    .page-wrap canvas {
      width: 100% !important;
      height: auto !important;
      display: block;
    }

    .status {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 4rem 2rem;
      text-align: center;
      width: 100%;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid rgba(245,224,144,0.15);
      border-top-color: #F5E090;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text {
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.08em;
      color: rgba(255,255,255,0.35);
    }

    .error-msg {
      font-size: 0.85rem;
      font-weight: 300;
      color: rgba(255,100,80,0.8);
      line-height: 1.6;
    }

    @media (max-width: 600px) {
      header { padding: 0 1rem; }
      .header-center { display: none; }
      .back-link { font-size: 0.65rem; }
      .btn-dl { font-size: 0.63rem; padding: 0.4rem 0.75rem; }
      .reader { padding: 0.75rem 0 2rem; gap: 0; }
      .page-wrap { margin-bottom: 1px; border-radius: 0; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">UpGrade</a>

  <div class="header-center">
    <span class="header-label">Extrait</span>
    <span class="header-sep">·</span>
    <div class="header-title-group">
      <span class="header-title">De l'idée au plan</span>
      <span class="header-tagline">Clarifier vos idées floues pour les transformer en un plan simple et concret.</span>
    </div>
  </div>

  <div class="header-actions">
    <a id="back-btn" href="/upgr/vente-eugene" class="back-link">← Retour</a>
    <a href="/upgr/extraits/idee-au-plan-extrait.pdf" download="De-l-idee-au-plan-extrait.pdf" class="btn-dl">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Télécharger
    </a>
  </div>
</header>

<div class="reader" id="reader">
  <div class="status" id="status">
    <div class="spinner"></div>
    <span class="status-text">Chargement de l'extrait…</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function () {
  var from = new URLSearchParams(window.location.search).get('from');
  var map = { eugene: '/upgr/vente-eugene', edouard: '/upgr/vente-edouard' };
  var btn = document.getElementById('back-btn');
  if (btn && map[from]) btn.href = map[from];
  else if (btn && document.referrer) btn.href = document.referrer;

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  var PDF_URL = '/upgr/extraits/idee-au-plan-extrait.pdf';
  var reader  = document.getElementById('reader');
  var status  = document.getElementById('status');

  var devicePixelRatio = window.devicePixelRatio || 1;

  pdfjsLib.getDocument(PDF_URL).promise.then(function (pdf) {
    status.remove();

    var renderPage = function (pageNum) {
      return pdf.getPage(pageNum).then(function (page) {
        var containerWidth = Math.min(reader.clientWidth - 32, 780);
        var viewport = page.getViewport({ scale: 1 });
        var scale = containerWidth / viewport.width;
        var scaledViewport = page.getViewport({ scale: scale * devicePixelRatio });

        var wrap = document.createElement('div');
        wrap.className = 'page-wrap';

        var canvas = document.createElement('canvas');
        canvas.width  = scaledViewport.width;
        canvas.height = scaledViewport.height;

        var ctx = canvas.getContext('2d');
        wrap.appendChild(canvas);
        reader.appendChild(wrap);

        return page.render({ canvasContext: ctx, viewport: scaledViewport }).promise;
      });
    };

    var chain = Promise.resolve();
    for (var i = 1; i <= pdf.numPages; i++) {
      (function (n) {
        chain = chain.then(function () { return renderPage(n); });
      })(i);
    }

    chain.catch(function (err) { showError(err); });

  }).catch(function (err) { showError(err); });

  function showError(err) {
    status.innerHTML =
      '<p class="error-msg">Impossible de charger l\'extrait.<br>' +
      '<a href="/upgr/extraits/idee-au-plan-extrait.pdf" download style="color:#F5E090;">Téléchargez-le directement.</a></p>';
    if (!status.parentNode) reader.appendChild(status);
    console.error(err);
  }
})();
</script>
</body>
</html>
